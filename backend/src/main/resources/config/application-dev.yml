# ===================================================================
# Spring Boot configuration for the "dev" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

logging:
  level:
    ROOT: DEBUG
    tech.jhipster: DEBUG
    org.hibernate.SQL: DEBUG
    com.classe360: DEBUG

spring:
  docker:
    compose:
      enabled: false
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/classe360
    username: postgres
    password: Postgres123
    hikari:
      poolName: Hikari
      auto-commit: false
  liquibase:
    contexts: dev
  # E-mail: o código de verificação é enviado para o e-mail cadastrado do usuário (Gmail, Hotmail, etc.).
  # Por padrão: localhost:25 (sem auth) — útil com Mailpit local ou sem SMTP.
  #
  # Para entregar na internet (Gmail, Outlook/Hotmail, etc.), defina variáveis de ambiente, por exemplo:
  #   MAIL_HOST=smtp.gmail.com
  #   MAIL_PORT=587
  #   MAIL_USERNAME=seu@gmail.com
  #   MAIL_PASSWORD=<senha de app do Google, não a senha da conta>
  #   MAIL_SMTP_AUTH=true
  #   MAIL_SMTP_STARTTLS=true
  #   MAIL_FROM=seu@gmail.com
  # Gmail: ative "Senha de app" em https://myaccount.google.com/apppasswords
  # Outlook/Hotmail: MAIL_HOST=smtp-mail.outlook.com (ou smtp.office365.com para contas Microsoft 365)
  #
  # Mailpit local: docker run -d -p 1025:1025 -p 8025:8025 axllent/mailpit
  #   depois MAIL_HOST=localhost MAIL_PORT=1025 (auth/starttls false)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false

server:
  port: 8080
  # make sure requests the proxy uri instead of the server one
  forward-headers-strategy: native

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  # CORS is only enabled by default with the "dev" profile
  cors:
    allowed-origins: 'http://localhost:3000,http://localhost:5173,http://localhost:8100,https://localhost:8100'
    # Enable CORS when running in GitHub Codespaces
    allowed-origin-patterns: 'https://*.githubpreview.dev'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: MDM3MjVkOWI0MjdlNGNjMjZiODMxZDUyOTI1ZTdhNzVhMmM3YmFiZDVlMjBiMzIxZmNlMzhmMTE5ZjA0Y2I1MWJkYjk2Mzg2NTgwOTUzZTQ1NWM3YjcwNDQ3OGRiYWU3NmNjODQ5MmRiNGI2OGZjZWQxMDlkOGM3NTJmODUxNTE=
        # Token is valid 24 hours
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  mail: # specific JHipster mail property, for standard properties see MailProperties
    base-url: http://127.0.0.1:8080
    # Remetente visível no cliente de e-mail — com Gmail/Outlook use o mesmo e-mail da conta SMTP (ou MAIL_FROM).
    from: ${MAIL_FROM:${MAIL_USERNAME:classe360@localhost}}
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
